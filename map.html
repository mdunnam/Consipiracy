      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.translate(offsetX + W/2, offsetY + H/2);
      ctx.scale(scale, scale);
      ctx.translate(-W/2, -H/2);

      const visEdges = edges.filter(e => e.source.visible && e.target.visible);
      const visNodes = nodes.filter(n => n.visible);

      // Draw edges
      visEdges.forEach(e => {
        const isHovered = hoveredNode && (e.source === hoveredNode || e.target === hoveredNode);
        ctx.beginPath();
        ctx.moveTo(e.source.x, e.source.y);
        ctx.lineTo(e.target.x, e.target.y);
        ctx.strokeStyle = isHovered ? 'rgba(201,162,39,0.5)' : 'rgba(255,255,255,0.04)';
        ctx.lineWidth   = isHovered ? 1.2 : 0.6;
        ctx.stroke();
      });

      // Draw nodes
      visNodes.forEach(n => {
        const col     = CAT_COLOR[n.cat] || '#888';
        const isHov   = n === hoveredNode;
        const r       = (n.size || 14) * (isHov ? 1.25 : 1);
        const alpha   = activeFilter === 'all' ? 1 : (n.cat === activeFilter ? 1 : 0.2);

        ctx.globalAlpha = alpha;

        // Glow on hover
        if (isHov) {
          ctx.shadowColor = col;
          ctx.shadowBlur  = 20;
        }

        // Node circle
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fillStyle = isHov ? col : col + '55';
        ctx.fill();
        ctx.strokeStyle = col;
        ctx.lineWidth   = isHov ? 2 : 1;
        ctx.stroke();

        ctx.shadowBlur = 0;

        // Label
        if (scale > 0.6 || isHov) {
          ctx.font      = `${isHov ? 600 : 400} ${Math.max(9, 11 * scale)}px Oswald, sans-serif`;
          ctx.fillStyle = isHov ? '#fff' : 'rgba(210,210,210,0.7)';
          ctx.textAlign = 'center';
          ctx.fillText(n.label, n.x, n.y + r + 13);
        }

        ctx.globalAlpha = 1;
      });

      ctx.restore();
    }

    function loop() {
      tick();
      draw();
      requestAnimationFrame(loop);
    }

    /* ── INPUT ── */
    function canvasToWorld(cx, cy) {
      return {
        x: (cx - offsetX - W/2) / scale + W/2,
        y: (cy - offsetY - H/2) / scale + H/2,
      };
    }

    function nodeAt(cx, cy) {
      const w = canvasToWorld(cx, cy);
      return nodes.find(n => {
        if (!n.visible) return false;
        const dx = w.x - n.x, dy = w.y - n.y;
        return Math.sqrt(dx*dx + dy*dy) < (n.size || 14) * 1.4;
      }) || null;
    }

    canvas.addEventListener('mousedown', e => {
      const hit = nodeAt(e.offsetX, e.offsetY);
      if (hit) return; // handled by click
      isDragging = true;
      dragStart  = { x: e.clientX, y: e.clientY };
      panStart   = { x: offsetX, y: offsetY };
    });

    window.addEventListener('mousemove', e => {
      if (isDragging && dragStart) {
        offsetX = panStart.x + (e.clientX - dragStart.x);
        offsetY = panStart.y + (e.clientY - dragStart.y);
        return;
      }
      const rect = canvas.getBoundingClientRect();
      const hit  = nodeAt(e.clientX - rect.left, e.clientY - rect.top);
      hoveredNode = hit || null;
      canvas.style.cursor = hit ? 'pointer' : 'grab';

      if (hit) {
        const ttEl = tooltip;
        document.getElementById('tt-title').textContent = hit.label;
        document.getElementById('tt-cat').textContent   = hit.cat.toUpperCase();
        document.getElementById('tt-desc').textContent  = hit.desc;
        document.getElementById('tt-link').href         = hit.url;
        ttEl.classList.add('visible');
        let tx = e.clientX + 16, ty = e.clientY + 16;
        if (tx + 260 > window.innerWidth)  tx = e.clientX - 260;
        if (ty + 120 > window.innerHeight) ty = e.clientY - 120;
        ttEl.style.left = tx + 'px';
        ttEl.style.top  = ty + 'px';
      } else {
        tooltip.classList.remove('visible');
      }
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const hit  = nodeAt(e.clientX - rect.left, e.clientY - rect.top);
      if (hit) window.location.href = hit.url;
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.min(4, Math.max(0.25, scale * delta));
    }, { passive: false });

    // Touch support
    let lastTouch = null;
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        lastTouch  = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        panStart   = { x: offsetX, y: offsetY };
      }
    }, { passive: true });
    canvas.addEventListener('touchmove', e => {
      if (e.touches.length === 1 && lastTouch) {
        offsetX = panStart.x + (e.touches[0].clientX - lastTouch.x);
        offsetY = panStart.y + (e.touches[0].clientY - lastTouch.y);
      }
    }, { passive: true });

    // Filter buttons
    document.querySelectorAll('.map-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.map-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.cat);
      });
    });

    // Init
    resize();
    window.addEventListener('resize', () => { resize(); });
    initNodes();
    loop();
  })();
  </script>
</body>
</html>
