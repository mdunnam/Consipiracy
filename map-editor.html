<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flat Earth Map Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050505; color: #d8d8d8; font-family: 'Share Tech Mono', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #topbar { background: #0a0a0a; border-bottom: 1px solid #1a1a1a; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    #topbar h1 { color: #c9a227; font-size: 0.85rem; letter-spacing: 0.2em; flex: 1; }
    .tbtn { background: transparent; border: 1px solid rgba(201,162,39,0.4); color: #c9a227; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; padding: 0.35rem 0.7rem; cursor: pointer; }
    .tbtn:hover { background: rgba(201,162,39,0.1); }
    .tbtn.red { border-color: rgba(200,50,50,0.4); color: #cc4444; }
    .tbtn.red:hover { background: rgba(200,50,50,0.1); }
    #zoom-display { font-size: 0.65rem; color: #4a4a4a; min-width: 42px; text-align: center; }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* Scrollable map */
    #map-scroll { flex: 1; overflow: auto; background: #111; }

    /* map-wrap: exactly image size, nothing more */
    #map-wrap {
      position: relative;
      display: table; /* shrinks to content, no stretching */
      line-height: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    #map-img {
      display: block;
      max-width: none;
      margin: 0; padding: 0; border: 0;
      user-select: none;
    }

    /* pin-layer: absolute, exactly covers image — no extra pixels */
    #pin-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      margin: 0; padding: 0; border: 0;
      cursor: crosshair;
      overflow: hidden;
    }

    /* crosshair: positioned by JS using offsetX/Y on pin-layer */
    #xhair {
      position: absolute;
      width: 1px; height: 1px;
      pointer-events: none;
      display: none;
      z-index: 20;
    }
    #xhair::before {
      content: '';
      position: absolute;
      width: 1px; height: 22px;
      left: 0; top: -11px;
      background: #c9a227;
      opacity: 0.9;
    }
    #xhair::after {
      content: '';
      position: absolute;
      width: 22px; height: 1px;
      left: -11px; top: 0;
      background: #c9a227;
      opacity: 0.9;
    }

    /* pins */
    .pin {
      position: absolute;
      width: 13px; height: 13px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: 2px solid rgba(255,255,255,0.5);
      z-index: 10;
    }
    .pin.pending {
      background: #fff !important;
      border-color: #c9a227 !important;
      box-shadow: 0 0 8px rgba(201,162,39,0.8);
    }
    /* flag label attached to pin */
    .pin-label {
      position: absolute;
      pointer-events: none;
      z-index: 11;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pin-label-text {
      color: #fff;
      font-family: 'Cinzel', 'Georgia', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow:
        0 0 4px rgba(0,0,0,1),
        0 0 8px rgba(0,0,0,0.9),
        1px 1px 0 rgba(0,0,0,0.9),
        -1px -1px 0 rgba(0,0,0,0.9),
        1px -1px 0 rgba(0,0,0,0.9),
        -1px 1px 0 rgba(0,0,0,0.9);
      line-height: 1;
      padding-bottom: 4px;
    }
    .pin-label-text.lbl-sm  { font-size: 9px;  letter-spacing: 0.14em; }
    .pin-label-text.lbl-lg  { font-size: 14px; letter-spacing: 0.22em; }
    .pin-label-stem {
      width: 1px;
      height: 10px;
      background: rgba(255,255,255,0.55);
    }

    #coordbar {
      position: fixed; bottom: 8px; left: 8px;
      background: rgba(0,0,0,0.92); padding: 3px 10px;
      font-size: 0.62rem; color: #c9a227;
      pointer-events: none; z-index: 9999;
      border: 1px solid #1a1a1a;
    }

    /* SIDEBAR */
    #sidebar { width: 310px; flex-shrink: 0; background: #0a0a0a; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow: hidden; }

    #form-panel { padding: 1rem; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
    #form-panel h3 { color: #c9a227; font-size: 0.7rem; letter-spacing: 0.1em; margin-bottom: 0.8rem; }
    #pending-status { font-size: 0.65rem; color: #3a3a3a; margin-bottom: 0.6rem; line-height: 1.6; }
    #pending-status.active { color: #4a7a4a; }
    .row { margin-bottom: 0.5rem; }
    .row label { display: block; font-size: 0.58rem; color: #4a4a4a; margin-bottom: 0.18rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .row input, .row textarea, .row select {
      width: 100%; background: #050505; border: 1px solid #222;
      color: #d8d8d8; padding: 0.38rem 0.55rem;
      font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; outline: none;
    }
    .row textarea { height: 52px; resize: vertical; }
    .btn { background: transparent; border: 1px solid rgba(201,162,39,0.4); color: #c9a227; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; padding: 0.32rem 0.7rem; cursor: pointer; margin-right: 0.3rem; margin-top: 0.3rem; }
    .btn:hover { background: rgba(201,162,39,0.1); }
    .btn.red { border-color: rgba(200,50,50,0.4); color: #cc4444; }
    .btn.red:hover { background: rgba(200,50,50,0.1); }
    .btn:disabled { opacity: 0.3; cursor: default; }

    #list-panel { flex: 1; overflow-y: auto; padding: 0.8rem; }
    #list-head { font-size: 0.62rem; color: #3a3a3a; letter-spacing: 0.1em; margin-bottom: 0.6rem; }
    .mitem { background: #111; border: 1px solid #1c1c1c; padding: 0.55rem; margin-bottom: 0.3rem; }
    .mname { font-size: 0.72rem; margin-bottom: 0.1rem; }
    .mmeta { font-size: 0.56rem; color: #333; }

    #export-panel { padding: 0.8rem; border-top: 1px solid #1a1a1a; flex-shrink: 0; }
    #export-panel h4 { font-size: 0.62rem; color: #4a7a4a; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    #json-out { font-size: 0.55rem; color: #3a3a3a; white-space: pre; overflow: auto; max-height: 80px; margin-top: 0.5rem; background: #050505; padding: 0.35rem; border: 1px solid #1a1a1a; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>⊕ FLAT EARTH MAP — MARKER EDITOR</h1>
  <span id="topcount" style="font-size:0.65rem;color:#4a4a4a;">0 markers</span>
  <button class="tbtn" onclick="zoom(-1)">&minus;</button>
  <span id="zoom-display">100%</span>
  <button class="tbtn" onclick="zoom(1)">+</button>
  <button class="tbtn" onclick="zoom(0)">FIT</button>
  <button class="tbtn red" onclick="clearAll()">CLEAR ALL</button>
</div>

<div id="main">

  <div id="map-scroll">
    <div id="map-wrap">
      <img id="map-img" src="images/flatearthmap.jpg" alt="Flat Earth Map" />
      <div id="pin-layer">
        <div id="xhair"></div>
      </div>
    </div>
  </div>

  <div id="sidebar">

    <div id="form-panel">
      <h3>PLACE &amp; LABEL MARKER</h3>
      <div id="pending-status">Click anywhere on the map to drop a pin. Click again to move it. Fill in details below then hit SAVE.</div>
      <div class="row"><label>Position</label><input id="fcoords" type="text" readonly placeholder="— click map —" style="color:#c9a227;" /></div>
      <div class="row"><label>Name</label><input id="fname" type="text" placeholder="e.g. North Pole" /></div>
      <div class="row"><label>Description (hover text)</label><textarea id="fdesc" placeholder="Short description shown on hover…"></textarea></div>
      <div class="row">
        <label>Category</label>
        <select id="fcat">
          <option value="structural">Structural Ring</option>
          <option value="landmass">Landmass</option>
          <option value="evidence">Evidence Site</option>
          <option value="suppressed">Suppressed / Restricted</option>
          <option value="ancient">Ancient / Sacred</option>
          <option value="anomalous">Anomalous Zone</option>
          <option value="boundary">Boundary</option>
          <option value="ocean">Ocean</option>
        </select>
      </div>
      <div class="row"><label>URL (page it links to)</label><input id="furl" type="text" placeholder="topics/flat-earth/north-pole-center.html" /></div>
      <div class="row" style="display:flex;align-items:center;gap:0.6rem;">
        <input type="checkbox" id="fshowlabel" style="width:auto;accent-color:#c9a227;cursor:pointer;" />
        <label for="fshowlabel" style="display:inline;font-size:0.62rem;color:#7a7a7a;letter-spacing:0.05em;cursor:pointer;">Show name as label on map</label>
      </div>
      <div id="curve-options" style="display:none;margin-top:0.4rem;padding:0.5rem;background:#080808;border:1px solid #1a1a1a;">
        <div class="row">
          <label>Label style</label>
          <select id="flabelstyle">
            <option value="flat">Flat (straight)</option>
            <option value="arc-up">Arc — curves up</option>
            <option value="arc-down">Arc — curves down</option>
            <option value="arc-left">Arc — curves left</option>
            <option value="arc-right">Arc — curves right</option>
          </select>
        </div>
        <div class="row">
          <label>Curve radius <span id="radius-val" style="color:#c9a227;">120px</span></label>
          <input type="range" id="fcurveradius" min="40" max="400" value="120" step="10"
            style="width:100%;accent-color:#c9a227;"
            oninput="document.getElementById('radius-val').textContent=this.value+'px'" />
        </div>
        <div class="row">
          <label>Font size <span id="fsize-val" style="color:#c9a227;">11px</span></label>
          <input type="range" id="ffontsize" min="7" max="24" value="11" step="1"
            style="width:100%;accent-color:#c9a227;"
            oninput="document.getElementById('fsize-val').textContent=this.value+'px'" />
        </div>
      </div>
      <button class="btn" id="save-btn" onclick="saveMarker()" disabled>✓ SAVE MARKER</button>
      <button class="btn red" id="clear-btn" onclick="clearPending()" disabled>✕ CLEAR PIN</button>
    </div>

    <div id="list-panel">
      <div id="list-head"></div>
      <div id="mlist"></div>
    </div>

    <div id="export-panel">
      <h4>EXPORT</h4>
      <button class="btn" onclick="doExport()">COPY JSON TO CLIPBOARD</button>
      <pre id="json-out"></pre>
    </div>

  </div>
</div>

<div id="coordbar">x: —&nbsp; y: —</div>

<script>
const COLORS = {
  structural:'#c9a227', landmass:'#fbbf24', evidence:'#4ade80',
  suppressed:'#f87171', ancient:'#c084fc', anomalous:'#fb923c',
  boundary:'#94a3b8', ocean:'#38bdf8'
};

let markers  = JSON.parse(localStorage.getItem('fe_markers') || '[]');
let pendingX = null;
let pendingY = null;

const pinLayer = document.getElementById('pin-layer');
const xhair    = document.getElementById('xhair');

// Show/hide curve options when label checkbox toggled
document.getElementById('fshowlabel').addEventListener('change', function() {
  document.getElementById('curve-options').style.display = this.checked ? 'block' : 'none';
});

// ── Mouse: move crosshair ──────────────────────────────────────────────────
pinLayer.addEventListener('mousemove', e => {
  xhair.style.display = 'block';
  // offsetX/Y are relative to pin-layer — same element pins are in
  xhair.style.left = e.offsetX + 'px';
  xhair.style.top  = e.offsetY + 'px';

  // Coords as % of pin-layer (which exactly covers the image)
  const x = (e.offsetX / pinLayer.offsetWidth  * 100).toFixed(3);
  const y = (e.offsetY / pinLayer.offsetHeight * 100).toFixed(3);
  document.getElementById('coordbar').textContent = `x: ${x}%  y: ${y}%`;
});

pinLayer.addEventListener('mouseleave', () => {
  xhair.style.display = 'none';
});

// ── Click: drop or move pending pin ───────────────────────────────────────
pinLayer.addEventListener('click', e => {
  const x = parseFloat((e.offsetX / pinLayer.offsetWidth  * 100).toFixed(3));
  const y = parseFloat((e.offsetY / pinLayer.offsetHeight * 100).toFixed(3));
  pendingX = x;
  pendingY = y;

  // Update coord display
  document.getElementById('fcoords').value = `x: ${x}%  y: ${y}%`;
  document.getElementById('pending-status').textContent = `Pin placed at ${x}%, ${y}% — click map to reposition, or fill details and save.`;
  document.getElementById('pending-status').className = 'active';
  document.getElementById('save-btn').disabled  = false;
  document.getElementById('clear-btn').disabled = false;

  // Move/place pending pin
  let pin = document.getElementById('pending-pin');
  if (!pin) {
    pin = document.createElement('div');
    pin.className = 'pin pending';
    pin.id = 'pending-pin';
    pinLayer.appendChild(pin);
  }
  pin.style.left = x + '%';
  pin.style.top  = y + '%';
});

// ── Save marker ───────────────────────────────────────────────────────────
function saveMarker() {
  const name = document.getElementById('fname').value.trim();
  if (!name)   { document.getElementById('fname').focus(); return; }
  if (pendingX === null) { alert('Click the map first to place a pin.'); return; }

  markers.push({
    x: pendingX, y: pendingY,
    name,
    desc: document.getElementById('fdesc').value.trim(),
    cat:  document.getElementById('fcat').value,
    url:  document.getElementById('furl').value.trim(),
    showLabel:   document.getElementById('fshowlabel').checked,
    labelStyle:  document.getElementById('flabelstyle').value,
    labelRadius: parseInt(document.getElementById('fcurveradius').value),
    labelSize:   parseInt(document.getElementById('ffontsize').value),
  });
  persist();
  clearPending();
  render();
}

// ── Clear pending pin ──────────────────────────────────────────────────────
function clearPending() {
  pendingX = pendingY = null;
  document.getElementById('pending-pin')?.remove();
  document.getElementById('fcoords').value = '';
  document.getElementById('fname').value   = '';
  document.getElementById('fdesc').value   = '';
  document.getElementById('furl').value    = '';
  document.getElementById('fshowlabel').checked = false;
  document.getElementById('curve-options').style.display = 'none';
  document.getElementById('flabelstyle').value = 'flat';
  document.getElementById('fcurveradius').value = '120';
  document.getElementById('ffontsize').value = '11';
  document.getElementById('radius-val').textContent = '120px';
  document.getElementById('fsize-val').textContent = '11px';
  document.getElementById('pending-status').textContent = 'Click anywhere on the map to drop a pin. Click again to move it. Fill in details below then hit SAVE.';
  document.getElementById('pending-status').className = '';
  document.getElementById('save-btn').disabled  = true;
  document.getElementById('clear-btn').disabled = true;
}

// ── Delete saved marker ───────────────────────────────────────────────────
function toggleLabel(i) {
  markers[i].showLabel = !markers[i].showLabel;
  persist();
  render();
}

function del(i) {
  markers.splice(i, 1);
  persist();
  render();
}

function persist() { localStorage.setItem('fe_markers', JSON.stringify(markers)); }

// ── Draw a single label (called from render + live preview) ────────────────────
function drawLabel(m, idx, svgIdOverride) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const col   = COLORS[m.cat] || '#ffffff';
  const fsize = m.labelSize   || 11;
  const rot   = m.labelRotate || 0;   // degrees, 0 = label sits directly above pin
  const style = m.labelStyle  || 'flat';
  const stemLen = 8;                  // px from pin edge to text baseline

  const px = m.x / 100 * pinLayer.offsetWidth;
  const py = m.y / 100 * pinLayer.offsetHeight;

  const letterSpacing = 2.5;
  const textLen = m.name.length * (fsize * 0.68) + (m.name.length - 1) * letterSpacing;
  const pathLen = textLen * 1.6;  // generous so no clipping
  const half    = pathLen / 2;

  // stem end point: rotate around pin
  const rotRad = rot * Math.PI / 180;
  const pinR   = 8; // pin radius px
  const stemX  = px + Math.sin(rotRad) * (pinR + stemLen);
  const stemY  = py - Math.cos(rotRad) * (pinR + stemLen);

  // label centre: a bit further from pin
  const labelDist = pinR + stemLen + 6;
  const lx = px + Math.sin(rotRad) * (labelDist + 2);
  const ly = py - Math.cos(rotRad) * (labelDist + 2);

  // arc radius (must be > half or SVG drops it)
  const r = Math.max(m.labelRadius || 150, half * 0.6 + 10);

  // Build path — all styles start from label centre, rotate to match orientation
  let d;
  if (style === 'arc-up') {
    d = `M ${lx - half} ${ly} A ${r} ${r} 0 0 1 ${lx + half} ${ly}`;
  } else if (style === 'arc-down') {
    d = `M ${lx - half} ${ly} A ${r} ${r} 0 0 0 ${lx + half} ${ly}`;
  } else if (style === 'arc-left') {
    d = `M ${lx} ${ly - half} A ${r} ${r} 0 0 0 ${lx} ${ly + half}`;
  } else if (style === 'arc-right') {
    d = `M ${lx} ${ly - half} A ${r} ${r} 0 0 1 ${lx} ${ly + half}`;
  } else {
    d = `M ${lx - half} ${ly} L ${lx + half} ${ly}`;
  }

  // Wrap everything in a group rotated around the pin
  const svgId = svgIdOverride || ('svg-label-' + idx);
  document.getElementById(svgId)?.remove();

  const svg = document.createElementNS(svgNS, 'svg');
  svg.id = svgId;
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:11;';

  const g = document.createElementNS(svgNS, 'g');
  g.setAttribute('transform', `rotate(${rot},${px},${py})`);

  // Stem line
  const line = document.createElementNS(svgNS, 'line');
  line.setAttribute('x1', String(px));
  line.setAttribute('y1', String(py));
  line.setAttribute('x2', String(stemX - Math.sin(rotRad) * px + Math.sin(rotRad) * px));
  line.setAttribute('y2', String(stemY + Math.cos(rotRad) * py - Math.cos(rotRad) * py));
  // Simpler: stem goes from pin to stemY in rotated group coords
  const stemLine = document.createElementNS(svgNS, 'line');
  stemLine.setAttribute('x1', String(px));
  stemLine.setAttribute('y1', String(py - pinR));
  stemLine.setAttribute('x2', String(px));
  stemLine.setAttribute('y2', String(py - pinR - stemLen - 2));
  stemLine.setAttribute('stroke', col + 'aa');
  stemLine.setAttribute('stroke-width', '1');
  g.appendChild(stemLine);

  // Text path
  const defs   = document.createElementNS(svgNS, 'defs');
  const pathEl = document.createElementNS(svgNS, 'path');
  const pathId = 'lp-' + svgId;
  pathEl.setAttribute('id', pathId);
  // In rotated group: recalc lx/ly relative to unrotated coords
  // Since the group rotates around px,py we use unrotated offsets
  const offX = Math.sin(rotRad) * (labelDist + 2);
  const offY = -Math.cos(rotRad) * (labelDist + 2);
  let dp;
  if (style === 'arc-up') {
    dp = `M ${px + offX - half} ${py + offY} A ${r} ${r} 0 0 1 ${px + offX + half} ${py + offY}`;
  } else if (style === 'arc-down') {
    dp = `M ${px + offX - half} ${py + offY} A ${r} ${r} 0 0 0 ${px + offX + half} ${py + offY}`;
  } else if (style === 'arc-left') {
    dp = `M ${px + offX} ${py + offY - half} A ${r} ${r} 0 0 0 ${px + offX} ${py + offY + half}`;
  } else if (style === 'arc-right') {
    dp = `M ${px + offX} ${py + offY - half} A ${r} ${r} 0 0 1 ${px + offX} ${py + offY + half}`;
  } else {
    dp = `M ${px + offX - half} ${py + offY - 2} L ${px + offX + half} ${py + offY - 2}`;
  }
  pathEl.setAttribute('d', dp);
  defs.appendChild(pathEl);
  svg.appendChild(defs);

  const mkText = (isOutline) => {
    const t  = document.createElementNS(svgNS, 'text');
    const tp = document.createElementNS(svgNS, 'textPath');
    tp.setAttribute('href', '#' + pathId);
    tp.setAttribute('startOffset', '50%');
    tp.textContent = m.name.toUpperCase();
    t.setAttribute('font-family', 'Cinzel, Georgia, serif');
    t.setAttribute('font-size', String(fsize));
    t.setAttribute('font-weight', '700');
    t.setAttribute('letter-spacing', String(letterSpacing));
    t.setAttribute('text-anchor', 'middle');
    if (isOutline) {
      t.setAttribute('stroke', 'rgba(0,0,0,0.95)');
      t.setAttribute('stroke-width', '3.5');
      t.setAttribute('stroke-linejoin', 'round');
      t.setAttribute('fill', 'none');
    } else {
      t.setAttribute('fill', '#ffffff');
      t.style.filter = `drop-shadow(0 0 5px ${col})`;
    }
    t.appendChild(tp);
    return t;
  };

  g.appendChild(mkText(true));
  g.appendChild(mkText(false));
  svg.appendChild(g);
  pinLayer.appendChild(svg);
}

// ── Render saved pins + list ───────────────────────────────────────────────
function render() {
  // Remove saved pins + labels (keep pending)
  pinLayer.querySelectorAll('.pin:not(.pending), .pin-label, svg[id^="svg-label"]').forEach(p => p.remove());

  markers.forEach((m, i) => {
    const d = document.createElement('div');
    d.className = 'pin';
    d.style.left       = m.x + '%';
    d.style.top        = m.y + '%';
    d.style.background = COLORS[m.cat] || '#c9a227';
    pinLayer.appendChild(d);

    if (m.showLabel && m.name) {
      drawLabel(m, i);
    }
  });

  document.getElementById('topcount').textContent = markers.length + ' marker' + (markers.length !== 1 ? 's' : '');

  const head = document.getElementById('list-head');
  const list = document.getElementById('mlist');
  head.textContent = markers.length ? markers.length + ' MARKER' + (markers.length !== 1 ? 'S' : '') + ' SAVED' : '';
  list.innerHTML = '';
  markers.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'mitem';
    el.innerHTML = `
      <div class="mname" style="color:${COLORS[m.cat]||'#c9a227'}">${m.name}${m.showLabel ? ' <span style="font-size:0.55rem;opacity:0.6;">[LABEL]</span>' : ''}</div>
      <div class="mmeta">${m.cat} &middot; ${m.x}%, ${m.y}%</div>
      <div style="margin-top:0.3rem;display:flex;gap:0.3rem;flex-wrap:wrap;">
        <button class="btn" style="font-size:0.56rem;padding:0.15rem 0.4rem;" onclick="toggleLabel(${i})">${m.showLabel ? 'HIDE LABEL' : 'SHOW LABEL'}</button>
        <button class="btn" style="font-size:0.56rem;padding:0.15rem 0.4rem;color:#38bdf8;border-color:rgba(56,189,248,0.4);" onclick="editLabel(${i})">EDIT LABEL</button>
        <button class="btn red" style="font-size:0.56rem;padding:0.15rem 0.4rem;" onclick="del(${i})">DELETE</button>
      </div>`;
    list.appendChild(el);
  });
}

// ── Edit label settings for existing marker ────────────────────────────────────────
function editLabel(i) {
  const m = markers[i];
  document.getElementById('label-edit-panel')?.remove();
  document.getElementById('label-edit-backdrop')?.remove();

  const panel = document.createElement('div');
  panel.id = 'label-edit-panel';
  panel.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:#0a0a0a;border:1px solid rgba(56,189,248,0.4);padding:1.2rem;width:300px;box-shadow:0 0 40px rgba(0,0,0,0.9);max-height:90vh;overflow-y:auto;';
  panel.innerHTML = `
    <div style="font-size:0.7rem;color:#38bdf8;letter-spacing:0.15em;margin-bottom:0.8rem;">EDIT LABEL — ${m.name}</div>
    <div style="margin-bottom:0.6rem;display:flex;align-items:center;gap:0.5rem;">
      <input type="checkbox" id="el-show" ${m.showLabel?'checked':''} style="accent-color:#c9a227;cursor:pointer;" onchange="livePreview(${i})" />
      <label for="el-show" style="font-size:0.62rem;color:#7a7a7a;cursor:pointer;">Show label on map</label>
    </div>
    <div style="margin-bottom:0.5rem;">
      <label style="display:block;font-size:0.58rem;color:#4a4a4a;margin-bottom:0.18rem;text-transform:uppercase;letter-spacing:0.08em;">Style</label>
      <select id="el-style" onchange="livePreview(${i})" style="width:100%;background:#050505;border:1px solid #222;color:#d8d8d8;padding:0.35rem 0.5rem;font-family:'Share Tech Mono',monospace;font-size:0.7rem;outline:none;">
        <option value="flat" ${(m.labelStyle||'flat')==='flat'?'selected':''}>Flat (straight)</option>
        <option value="arc-up" ${m.labelStyle==='arc-up'?'selected':''}>Arc — curves up</option>
        <option value="arc-down" ${m.labelStyle==='arc-down'?'selected':''}>Arc — curves down</option>
        <option value="arc-left" ${m.labelStyle==='arc-left'?'selected':''}>Arc — curves left</option>
        <option value="arc-right" ${m.labelStyle==='arc-right'?'selected':''}>Arc — curves right</option>
      </select>
    </div>
    <div style="margin-bottom:0.5rem;">
      <label style="display:block;font-size:0.58rem;color:#4a4a4a;margin-bottom:0.18rem;text-transform:uppercase;letter-spacing:0.08em;">Rotation around pin: <span id="el-rotval" style="color:#c9a227;">${m.labelRotate||0}°</span></label>
      <input type="range" id="el-rot" min="0" max="359" value="${m.labelRotate||0}" step="1"
        style="width:100%;accent-color:#c9a227;"
        oninput="document.getElementById('el-rotval').textContent=this.value+'°';livePreview(${i})" />
    </div>
    <div style="margin-bottom:0.5rem;">
      <label style="display:block;font-size:0.58rem;color:#4a4a4a;margin-bottom:0.18rem;text-transform:uppercase;letter-spacing:0.08em;">Curve radius: <span id="el-rval" style="color:#c9a227;">${m.labelRadius||150}px</span></label>
      <input type="range" id="el-radius" min="40" max="600" value="${m.labelRadius||150}" step="10"
        style="width:100%;accent-color:#c9a227;"
        oninput="document.getElementById('el-rval').textContent=this.value+'px';livePreview(${i})" />
    </div>
    <div style="margin-bottom:0.8rem;">
      <label style="display:block;font-size:0.58rem;color:#4a4a4a;margin-bottom:0.18rem;text-transform:uppercase;letter-spacing:0.08em;">Font size: <span id="el-fval" style="color:#c9a227;">${m.labelSize||11}px</span></label>
      <input type="range" id="el-fsize" min="7" max="28" value="${m.labelSize||11}" step="1"
        style="width:100%;accent-color:#c9a227;"
        oninput="document.getElementById('el-fval').textContent=this.value+'px';livePreview(${i})" />
    </div>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn" style="flex:1;" onclick="applyLabelEdit(${i})">SAVE</button>
      <button class="btn red" style="flex:1;" onclick="cancelLabelEdit(${i})">CANCEL</button>
    </div>
  `;

  const backdrop = document.createElement('div');
  backdrop.id = 'label-edit-backdrop';
  backdrop.style.cssText = 'position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.5);';
  backdrop.onclick = () => cancelLabelEdit(i);
  document.body.appendChild(backdrop);
  document.body.appendChild(panel);

  // Show live preview immediately
  livePreview(i);
}

// Read current panel values into a temp marker and draw it
function livePreview(i) {
  const show = document.getElementById('el-show')?.checked;
  if (!show) { document.getElementById('svg-label-' + i)?.remove(); return; }
  const tmp = Object.assign({}, markers[i], {
    showLabel:   true,
    labelStyle:  document.getElementById('el-style')?.value   || markers[i].labelStyle,
    labelRotate: parseInt(document.getElementById('el-rot')?.value    || markers[i].labelRotate || 0),
    labelRadius: parseInt(document.getElementById('el-radius')?.value || markers[i].labelRadius || 150),
    labelSize:   parseInt(document.getElementById('el-fsize')?.value  || markers[i].labelSize   || 11),
  });
  drawLabel(tmp, i);
}

function applyLabelEdit(i) {
  markers[i].showLabel   = document.getElementById('el-show').checked;
  markers[i].labelStyle  = document.getElementById('el-style').value;
  markers[i].labelRotate = parseInt(document.getElementById('el-rot').value);
  markers[i].labelRadius = parseInt(document.getElementById('el-radius').value);
  markers[i].labelSize   = parseInt(document.getElementById('el-fsize').value);
  persist();
  render();
  document.getElementById('label-edit-panel')?.remove();
  document.getElementById('label-edit-backdrop')?.remove();
}

function cancelLabelEdit(i) {
  document.getElementById('label-edit-panel')?.remove();
  document.getElementById('label-edit-backdrop')?.remove();
  render(); // restore original
}

function clearAll() {
  if (!markers.length || !confirm('Delete all ' + markers.length + ' markers?')) return;
  markers = [];
  persist();
  clearPending();
  render();
}

// ── Zoom ─────────────────────────────────────────────────────────────────
const ZOOM_STEPS = [25, 33, 50, 75, 100, 125, 150, 200, 300, 400];
let zoomIdx = 4; // start at 100%
const mapImg = document.getElementById('map-img');
const naturalW = 4096;

function applyZoom() {
  const pct = ZOOM_STEPS[zoomIdx];
  mapImg.style.width = (naturalW * pct / 100) + 'px';
  document.getElementById('zoom-display').textContent = pct + '%';
  // Re-render labels so px positions match new zoom
  render();
}

function zoom(dir) {
  if (dir === 0) {
    const avail = document.getElementById('map-scroll').clientWidth;
    let best = 0;
    for (let i = 0; i < ZOOM_STEPS.length; i++) {
      if ((naturalW * ZOOM_STEPS[i] / 100) <= avail) best = i;
    }
    zoomIdx = best;
  } else {
    zoomIdx = Math.max(0, Math.min(ZOOM_STEPS.length - 1, zoomIdx + dir));
  }
  applyZoom();
}

document.getElementById('map-scroll').addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1 : -1);
}, { passive: false });

window.addEventListener('load', () => zoom(0));

render();
</script>
