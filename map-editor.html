<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flat Earth Map Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050505; color: #d8d8d8; font-family: 'Share Tech Mono', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #topbar { background: #0a0a0a; border-bottom: 1px solid #1a1a1a; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    #topbar h1 { color: #c9a227; font-size: 0.85rem; letter-spacing: 0.2em; flex: 1; }
    .tbtn { background: transparent; border: 1px solid rgba(201,162,39,0.4); color: #c9a227; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; padding: 0.35rem 0.7rem; cursor: pointer; }
    .tbtn:hover { background: rgba(201,162,39,0.1); }
    .tbtn.red { border-color: rgba(200,50,50,0.4); color: #cc4444; }
    .tbtn.red:hover { background: rgba(200,50,50,0.1); }
    #zoom-display { font-size: 0.65rem; color: #4a4a4a; min-width: 42px; text-align: center; }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* Scrollable map */
    #map-scroll { flex: 1; overflow: auto; background: #111; }

    /* map-wrap: exactly image size, nothing more */
    #map-wrap {
      position: relative;
      display: table; /* shrinks to content, no stretching */
      line-height: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    #map-img {
      display: block;
      max-width: none;
      margin: 0; padding: 0; border: 0;
      user-select: none;
    }

    /* pin-layer: absolute, exactly covers image — no extra pixels */
    #pin-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      margin: 0; padding: 0; border: 0;
      cursor: crosshair;
      overflow: hidden;
    }

    /* crosshair: positioned by JS using offsetX/Y on pin-layer */
    #xhair {
      position: absolute;
      width: 1px; height: 1px;
      pointer-events: none;
      display: none;
      z-index: 20;
    }
    #xhair::before {
      content: '';
      position: absolute;
      width: 1px; height: 22px;
      left: 0; top: -11px;
      background: #c9a227;
      opacity: 0.9;
    }
    #xhair::after {
      content: '';
      position: absolute;
      width: 22px; height: 1px;
      left: -11px; top: 0;
      background: #c9a227;
      opacity: 0.9;
    }

    /* pins */
    .pin {
      position: absolute;
      width: 13px; height: 13px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: 2px solid rgba(255,255,255,0.5);
      z-index: 10;
    }
    .pin.pending {
      background: #fff !important;
      border-color: #c9a227 !important;
      box-shadow: 0 0 8px rgba(201,162,39,0.8);
    }
    /* flag label attached to pin */
    .pin-label {
      position: absolute;
      pointer-events: none;
      z-index: 11;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pin-label-text {
      color: #fff;
      font-family: 'Cinzel', 'Georgia', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow:
        0 0 4px rgba(0,0,0,1),
        0 0 8px rgba(0,0,0,0.9),
        1px 1px 0 rgba(0,0,0,0.9),
        -1px -1px 0 rgba(0,0,0,0.9),
        1px -1px 0 rgba(0,0,0,0.9),
        -1px 1px 0 rgba(0,0,0,0.9);
      line-height: 1;
      padding-bottom: 4px;
    }
    .pin-label-text.lbl-sm  { font-size: 9px;  letter-spacing: 0.14em; }
    .pin-label-text.lbl-lg  { font-size: 14px; letter-spacing: 0.22em; }
    .pin-label-stem {
      width: 1px;
      height: 10px;
      background: rgba(255,255,255,0.55);
    }

    #coordbar {
      position: fixed; bottom: 8px; left: 8px;
      background: rgba(0,0,0,0.92); padding: 3px 10px;
      font-size: 0.62rem; color: #c9a227;
      pointer-events: none; z-index: 9999;
      border: 1px solid #1a1a1a;
    }

    /* SIDEBAR */
    #sidebar { width: 310px; flex-shrink: 0; background: #0a0a0a; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow: hidden; }

    #form-panel { padding: 1rem; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
    #form-panel h3 { color: #c9a227; font-size: 0.7rem; letter-spacing: 0.1em; margin-bottom: 0.8rem; }
    #pending-status { font-size: 0.65rem; color: #3a3a3a; margin-bottom: 0.6rem; line-height: 1.6; }
    #pending-status.active { color: #4a7a4a; }
    .row { margin-bottom: 0.5rem; }
    .row label { display: block; font-size: 0.58rem; color: #4a4a4a; margin-bottom: 0.18rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .row input, .row textarea, .row select {
      width: 100%; background: #050505; border: 1px solid #222;
      color: #d8d8d8; padding: 0.38rem 0.55rem;
      font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; outline: none;
    }
    .row textarea { height: 52px; resize: vertical; }
    .btn { background: transparent; border: 1px solid rgba(201,162,39,0.4); color: #c9a227; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; padding: 0.32rem 0.7rem; cursor: pointer; margin-right: 0.3rem; margin-top: 0.3rem; }
    .btn:hover { background: rgba(201,162,39,0.1); }
    .btn.red { border-color: rgba(200,50,50,0.4); color: #cc4444; }
    .btn.red:hover { background: rgba(200,50,50,0.1); }
    .btn:disabled { opacity: 0.3; cursor: default; }

    #list-panel { flex: 1; overflow-y: auto; padding: 0.8rem; }
    #list-head { font-size: 0.62rem; color: #3a3a3a; letter-spacing: 0.1em; margin-bottom: 0.6rem; }
    .mitem { background: #111; border: 1px solid #1c1c1c; padding: 0.55rem; margin-bottom: 0.3rem; }
    .mname { font-size: 0.72rem; margin-bottom: 0.1rem; }
    .mmeta { font-size: 0.56rem; color: #333; }

    #export-panel { padding: 0.8rem; border-top: 1px solid #1a1a1a; flex-shrink: 0; }
    #export-panel h4 { font-size: 0.62rem; color: #4a7a4a; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    #json-out { font-size: 0.55rem; color: #3a3a3a; white-space: pre; overflow: auto; max-height: 80px; margin-top: 0.5rem; background: #050505; padding: 0.35rem; border: 1px solid #1a1a1a; }
    #import-panel { padding: 0.8rem; border-top: 1px solid #1a1a1a; flex-shrink: 0; }
    #import-panel h4 { font-size: 0.62rem; color: #4a6a8a; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    #import-paste { font-size: 0.55rem; width: 100%; box-sizing: border-box; background: #050505; color: #888; border: 1px solid #1c1c1c; padding: 0.35rem; font-family: monospace; resize: vertical; min-height: 50px; max-height: 120px; margin-bottom: 0.4rem; }
    #import-error { font-size: 0.58rem; color: #cc4444; margin-top: 0.3rem; min-height: 1em; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>⊕ FLAT EARTH MAP — MARKER EDITOR</h1>
  <span id="topcount" style="font-size:0.65rem;color:#4a4a4a;">0 markers</span>
  <button class="tbtn" onclick="zoom(-1)">&minus;</button>
  <span id="zoom-display">100%</span>
  <button class="tbtn" onclick="zoom(1)">+</button>
  <button class="tbtn" onclick="zoom(0)">FIT</button>
  <button class="tbtn red" onclick="clearAll()">CLEAR ALL</button>
</div>

<div id="main">

  <div id="map-scroll">
    <div id="map-wrap">
      <img id="map-img" src="images/flatearth_new.png" alt="Flat Earth Map" />
      <div id="pin-layer">
        <div id="xhair"></div>
      </div>
    </div>
  </div>

  <div id="sidebar">

    <div id="form-panel">
      <h3>PLACE &amp; LABEL MARKER</h3>
      <div id="pending-status">Click anywhere on the map to drop a pin. Click again to move it. Fill in details below then hit SAVE.</div>
      <div class="row"><label>Position</label><input id="fcoords" type="text" readonly placeholder="— click map —" style="color:#c9a227;" /></div>
      <div class="row"><label>Name</label><input id="fname" type="text" placeholder="e.g. North Pole" /></div>
      <div class="row"><label>Description (hover text)</label><textarea id="fdesc" placeholder="Short description shown on hover…"></textarea></div>
      <div class="row">
        <label>Category</label>
        <select id="fcat">
          <option value="structural">Structural Ring</option>
          <option value="landmass">Landmass</option>
          <option value="evidence">Evidence Site</option>
          <option value="suppressed">Suppressed / Restricted</option>
          <option value="ancient">Ancient / Sacred</option>
          <option value="anomalous">Anomalous Zone</option>
          <option value="boundary">Boundary</option>
          <option value="ocean">Ocean</option>
        </select>
      </div>
      <div class="row"><label>URL (page it links to)</label><input id="furl" type="text" placeholder="topics/flat-earth/north-pole-center.html" /></div>
      <div class="row" style="display:flex;align-items:center;gap:0.6rem;">
        <input type="checkbox" id="fshowlabel" style="width:auto;accent-color:#c9a227;cursor:pointer;" />
        <label for="fshowlabel" style="display:inline;font-size:0.62rem;color:#7a7a7a;letter-spacing:0.05em;cursor:pointer;">Show name as label on map</label>
      </div>
      <div id="curve-options" style="display:none;margin-top:0.4rem;padding:0.5rem;background:#080808;border:1px solid #1a1a1a;">
        <div class="row">
          <label>Label style</label>
          <select id="flabelstyle">
            <option value="flat">Flat (straight)</option>
            <option value="arc-up">Arc — curves up</option>
            <option value="arc-down">Arc — curves down</option>
            <option value="arc-left">Arc — curves left</option>
            <option value="arc-right">Arc — curves right</option>
          </select>
        </div>
        <div class="row">
          <label>Curve radius <span id="radius-val" style="color:#c9a227;">120px</span> <span style="color:#555;font-size:0.55rem;">(smaller = tighter arc)</span></label>
          <input type="range" id="fcurveradius" min="10" max="400" value="120" step="5"
            style="width:100%;accent-color:#c9a227;"
            oninput="document.getElementById('radius-val').textContent=this.value+'px'" />
        </div>
        <div class="row">
          <label>Font size <span id="fsize-val" style="color:#c9a227;">11px</span></label>
          <input type="range" id="ffontsize" min="7" max="24" value="11" step="1"
            style="width:100%;accent-color:#c9a227;"
            oninput="document.getElementById('fsize-val').textContent=this.value+'px'" />
        </div>
      </div>
      <button class="btn" id="save-btn" onclick="saveMarker()" disabled>✓ SAVE MARKER</button>
      <button class="btn red" id="clear-btn" onclick="clearPending()" disabled>✕ CLEAR PIN</button>
    </div>

    <div id="list-panel">
      <div id="list-head"></div>
      <div id="mlist"></div>
    </div>

    <div id="import-panel">
      <h4>IMPORT</h4>
      <button class="btn" onclick="document.getElementById('import-file').click()">📂 LOAD JSON FILE</button>
      <input type="file" id="import-file" accept=".json,application/json" style="display:none" onchange="importFromFile(this)" />
      <div style="margin-top:0.5rem;">
        <textarea id="import-paste" placeholder="…or paste JSON array here and hit LOAD"></textarea>
        <button class="btn" onclick="importFromPaste()">LOAD PASTED JSON</button>
      </div>
      <div id="import-error"></div>
    </div>

    <div id="export-panel">
      <h4>EXPORT</h4>
      <button class="btn" onclick="doExport()">COPY JSON TO CLIPBOARD</button>
      <pre id="json-out"></pre>
    </div>

  </div>
</div>

<div id="coordbar">x: —&nbsp; y: —</div>

<script>
const COLORS = {
  structural:'#c9a227', landmass:'#fbbf24', evidence:'#4ade80',
  suppressed:'#f87171', ancient:'#c084fc', anomalous:'#fb923c',
  boundary:'#94a3b8', ocean:'#38bdf8'
};

let markers  = JSON.parse(localStorage.getItem('fe_markers') || '[]');
let pendingX = null;
let pendingY = null;
let moveIdx  = null;  // index of marker being repositioned

const pinLayer = document.getElementById('pin-layer');
const xhair    = document.getElementById('xhair');

// Show/hide curve options when label checkbox toggled
document.getElementById('fshowlabel').addEventListener('change', function() {
  document.getElementById('curve-options').style.display = this.checked ? 'block' : 'none';
});

// ── Mouse: move crosshair ──────────────────────────────────────────────────
pinLayer.addEventListener('mousemove', e => {
  xhair.style.display = 'block';
  // offsetX/Y are relative to pin-layer — same element pins are in
  xhair.style.left = e.offsetX + 'px';
  xhair.style.top  = e.offsetY + 'px';

  // Coords as % of pin-layer (which exactly covers the image)
  const x = (e.offsetX / pinLayer.offsetWidth  * 100).toFixed(3);
  const y = (e.offsetY / pinLayer.offsetHeight * 100).toFixed(3);
  document.getElementById('coordbar').textContent = `x: ${x}%  y: ${y}%`;
});

pinLayer.addEventListener('mouseleave', () => {
  xhair.style.display = 'none';
});

// ── Click: drop/move pending pin OR reposition existing marker ───────────
pinLayer.addEventListener('click', e => {
  const x = parseFloat((e.offsetX / pinLayer.offsetWidth  * 100).toFixed(3));
  const y = parseFloat((e.offsetY / pinLayer.offsetHeight * 100).toFixed(3));

  // MOVE MODE: reposition an existing saved marker
  if (moveIdx !== null) {
    markers[moveIdx].x = x;
    markers[moveIdx].y = y;
    persist();
    cancelMove();
    render();
    return;
  }

  pendingX = x;
  pendingY = y;

  // Update coord display
  document.getElementById('fcoords').value = `x: ${x}%  y: ${y}%`;
  document.getElementById('pending-status').textContent = `Pin placed at ${x}%, ${y}% — click map to reposition, or fill details and save.`;
  document.getElementById('pending-status').className = 'active';
  document.getElementById('save-btn').disabled  = false;
  document.getElementById('clear-btn').disabled = false;

  // Move/place pending pin
  let pin = document.getElementById('pending-pin');
  if (!pin) {
    pin = document.createElement('div');
    pin.className = 'pin pending';
    pin.id = 'pending-pin';
    pinLayer.appendChild(pin);
  }
  pin.style.left = x + '%';
  pin.style.top  = y + '%';
});

// ── Save marker ───────────────────────────────────────────────────────────
function saveMarker() {
  const name = document.getElementById('fname').value.trim();
  if (!name)   { document.getElementById('fname').focus(); return; }
  if (pendingX === null) { alert('Click the map first to place a pin.'); return; }

  markers.push({
    x: pendingX, y: pendingY,
    name,
    desc: document.getElementById('fdesc').value.trim(),
    cat:  document.getElementById('fcat').value,
    url:  document.getElementById('furl').value.trim(),
    showLabel:   document.getElementById('fshowlabel').checked,
    labelStyle:  document.getElementById('flabelstyle').value,
    labelRadius: parseInt(document.getElementById('fcurveradius').value),
    labelSize:   parseInt(document.getElementById('ffontsize').value),
  });
  persist();
  clearPending();
  render();
}

// ── Clear pending pin ──────────────────────────────────────────────────────
function clearPending() {
  if (moveIdx !== null) { cancelMove(); return; }
  pendingX = pendingY = null;
  document.getElementById('pending-pin')?.remove();
  document.getElementById('fcoords').value = '';
  document.getElementById('fname').value   = '';
  document.getElementById('fdesc').value   = '';
  document.getElementById('furl').value    = '';
  document.getElementById('fshowlabel').checked = false;
  document.getElementById('curve-options').style.display = 'none';
  document.getElementById('flabelstyle').value = 'flat';
  document.getElementById('fcurveradius').value = '120';
  document.getElementById('ffontsize').value = '11';
  document.getElementById('radius-val').textContent = '120px';
  document.getElementById('fsize-val').textContent = '11px';
  document.getElementById('pending-status').textContent = 'Click anywhere on the map to drop a pin. Click again to move it. Fill in details below then hit SAVE.';
  document.getElementById('pending-status').className = '';
  document.getElementById('save-btn').disabled  = true;
  document.getElementById('clear-btn').disabled = true;
}

// ── Delete saved marker ───────────────────────────────────────────────────
function toggleLabel(i) {
  markers[i].showLabel = !markers[i].showLabel;
  persist();
  render();
}

function del(i) {
  markers.splice(i, 1);
  persist();
  render();
}

function persist() { localStorage.setItem('fe_markers', JSON.stringify(markers)); }

// ── Draw a single label ─────────────────────────────────────────────────────
function buildPath(svgNS, id, lcx, lcy, half, r, style) {
  const el = document.createElementNS(svgNS, 'path');
  el.setAttribute('id', id);
  let d;
  // S-curve: cubic bezier with control points pulling opposite directions
  // amplitude = how tall/wide the S is (use r as the amplitude)
  const amp = Math.min(r * 0.4, half * 0.6);
  if      (style === 'arc-up')    d = `M ${lcx-half} ${lcy} A ${r} ${r} 0 0 1 ${lcx+half} ${lcy}`;
  else if (style === 'arc-down')  d = `M ${lcx-half} ${lcy} A ${r} ${r} 0 0 0 ${lcx+half} ${lcy}`;
  else if (style === 'arc-left')  d = `M ${lcx} ${lcy-half} A ${r} ${r} 0 0 0 ${lcx} ${lcy+half}`;
  else if (style === 'arc-right') d = `M ${lcx} ${lcy-half} A ${r} ${r} 0 0 1 ${lcx} ${lcy+half}`;
  else if (style === 's-curve') {
    // Horizontal S: first half curves up, second half curves down
    const mx = lcx, my = lcy;
    d = `M ${lcx-half} ${lcy} C ${lcx-half*0.5} ${lcy-amp} ${mx} ${lcy-amp} ${mx} ${lcy} C ${mx} ${lcy+amp} ${lcx+half*0.5} ${lcy+amp} ${lcx+half} ${lcy}`;
  }
  else if (style === 's-curve-v') {
    // Vertical S: first half curves left, second half curves right
    const my = lcy, mx = lcx;
    d = `M ${lcx} ${lcy-half} C ${lcx-amp} ${lcy-half*0.5} ${lcx-amp} ${my} ${lcx} ${my} C ${lcx+amp} ${my} ${lcx+amp} ${lcy+half*0.5} ${lcx} ${lcy+half}`;
  }
  else                             d = `M ${lcx-half} ${lcy} L ${lcx+half} ${lcy}`;
  el.setAttribute('d', d);
  return el;
}

function addTextOnPath(svgNS, pathId, text, fontSize, letterSp, fillColor, outlineColor, isOutline, zs, shadowFilterId) {
  const t  = document.createElementNS(svgNS, 'text');
  const tp = document.createElementNS(svgNS, 'textPath');
  tp.setAttribute('href', '#' + pathId);
  tp.setAttribute('startOffset', '50%');
  tp.textContent = text;
  t.setAttribute('font-family', 'Cinzel, Georgia, serif');
  t.setAttribute('font-size', String(fontSize));
  t.setAttribute('font-weight', '700');
  t.setAttribute('letter-spacing', String(letterSp));
  t.setAttribute('text-anchor', 'middle');
  if (isOutline) {
    t.setAttribute('stroke', outlineColor);
    t.setAttribute('stroke-width', String(Math.max(1, 3.5 * zs)));
    t.setAttribute('stroke-linejoin', 'round');
    t.setAttribute('fill', 'none');
  } else {
    t.setAttribute('fill', fillColor);
    if (shadowFilterId) {
      t.setAttribute('filter', `url(#${shadowFilterId})`);
    }
  }
  t.appendChild(tp);
  return t;
}

function drawLabel(m, idx) {
  const svgNS  = 'http://www.w3.org/2000/svg';
  const rot    = m.labelRotate   || 0;
  const style  = m.labelStyle    || 'flat';
  const dist   = m.labelDistance || 30;
  const fsize  = (m.labelSize    || 11) * zoomScale;
  const fill   = m.labelColor    || '#ffffff';
  const outline= m.labelOutline  || '#000000';
  const pinR   = 7;
  const letterSpacing = 2.5;

  const px = m.x / 100 * pinLayer.offsetWidth;
  const py = m.y / 100 * pinLayer.offsetHeight;

  // Main text path
  const textLen = m.name.length * (fsize * 0.68) + (m.name.length - 1) * letterSpacing;
  const half    = textLen * 0.85;
  const r       = m.labelRadius || 120;   // no floor — slider has full control

  // Compensate lcy so the visual centre of the text (not the path baseline) stays at
  // exactly `dist` pixels from the pin, regardless of font size.
  // SVG text-on-path sits above its baseline by ~0.75em for arc-up, below for arc-down.
  const isArcDown = style === 'arc-down';
  const fontOffset = isArcDown ? fsize * 0.25 : -fsize * 0.75;
  const lcy     = py - dist + fontOffset;
  const lcx     = px;

  // Subtitle
  const hasSub  = m.subtitle && m.subtitle.trim();
  const subSize = (m.subSize  || 8) * zoomScale;
  const subOff  = (m.subOffset|| 14) * zoomScale;
  const subFill = m.subColor  || '#aaaaaa';
  const subStyle= m.subStyle  || 'flat';
  const subR    = m.subRadius || 120;      // no floor — follows main radius control
  const subHalf = (m.subtitle||'').length * (subSize * 0.68) * 0.85;

  // Remove old
  document.getElementById('svg-label-' + idx)?.remove();
  const svg = document.createElementNS(svgNS, 'svg');
  svg.id = 'svg-label-' + idx;
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:11;';

  // Group — rotated around pin
  const g = document.createElementNS(svgNS, 'g');
  g.setAttribute('transform', `rotate(${rot},${px},${py})`);

  // Stem
  const stem = document.createElementNS(svgNS, 'line');
  stem.setAttribute('x1', String(px));
  stem.setAttribute('y1', String(py - pinR));
  stem.setAttribute('x2', String(px));
  stem.setAttribute('y2', String(py - dist));  // stem always ends at the intended gap
  stem.setAttribute('stroke', fill + '88');
  stem.setAttribute('stroke-width', String(Math.max(0.5, zoomScale)));
  g.appendChild(stem);

  // Defs: paths + SVG feFlood shadow filter
  const defs = document.createElementNS(svgNS, 'defs');
  const pid  = 'lp-'  + idx;
  const spid = 'lps-' + idx;
  const sfid = 'sf-'  + idx;
  defs.appendChild(buildPath(svgNS, pid,  lcx, lcy,                   half,    r,    style));
  if (hasSub)
    defs.appendChild(buildPath(svgNS, spid, lcx, lcy + fsize + subOff, subHalf, subR, subStyle));

  // Build proper SVG shadow filter (feFlood+feComposite+feGaussianBlur+feMerge)
  const sc   = m.shadowColor   || '#000000';
  const sbpx = (m.shadowBlur   ?? 4) * zoomScale;
  const so   = m.shadowOpacity ?? 0.8;
  let filtRef = null;
  if (sbpx > 0) {
    filtRef = sfid;
    const filt = document.createElementNS(svgNS, 'filter');
    filt.setAttribute('id', sfid);
    filt.setAttribute('x', '-60%'); filt.setAttribute('width',  '220%');
    filt.setAttribute('y', '-60%'); filt.setAttribute('height', '220%');
    const mk = (tag, attrs) => {
      const el = document.createElementNS(svgNS, tag);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
      return el;
    };
    filt.appendChild(mk('feFlood',      { 'flood-color': sc, 'flood-opacity': String(so), result: 'color' }));
    filt.appendChild(mk('feComposite',  { in: 'color', in2: 'SourceAlpha', operator: 'in', result: 'shaped' }));
    filt.appendChild(mk('feGaussianBlur',{ in: 'shaped', stdDeviation: String(sbpx), result: 'blurred' }));
    filt.appendChild(mk('feOffset',     { dx: '0', dy: '0', result: 'offset' }));
    const merge = document.createElementNS(svgNS, 'feMerge');
    merge.appendChild(mk('feMergeNode', { in: 'offset' }));
    merge.appendChild(mk('feMergeNode', { in: 'SourceGraphic' }));
    filt.appendChild(merge);
    defs.appendChild(filt);
  }

  svg.appendChild(defs);

  // Main text
  g.appendChild(addTextOnPath(svgNS, pid,  m.name.toUpperCase(),       fsize,   letterSpacing, fill,    outline, true,  zoomScale, null));
  g.appendChild(addTextOnPath(svgNS, pid,  m.name.toUpperCase(),       fsize,   letterSpacing, fill,    outline, false, zoomScale, filtRef));

  // Subtitle
  if (hasSub) {
    g.appendChild(addTextOnPath(svgNS, spid, m.subtitle.toUpperCase(), subSize, 1.5, subFill, '#000000', true,  zoomScale, null));
    g.appendChild(addTextOnPath(svgNS, spid, m.subtitle.toUpperCase(), subSize, 1.5, subFill, '#000000', false, zoomScale, filtRef));
  }

  svg.appendChild(g);
  pinLayer.appendChild(svg);
}

// ── Move existing marker ─────────────────────────────────────────────────────
function startMove(i) {
  // Cancel any pending new-marker placement
  clearPending();
  moveIdx = i;
  // Show banner
  const status = document.getElementById('pending-status');
  status.textContent = `MOVING: "${markers[i].name}" — click map to set new position. Press CANCEL to abort.`;
  status.className = 'active';
  document.getElementById('save-btn').disabled  = true;
  document.getElementById('clear-btn').disabled = false;
  document.getElementById('clear-btn').textContent = '✕ CANCEL MOVE';
  // Highlight the pin being moved
  render();
  // Flash the pin
  const pins = pinLayer.querySelectorAll('.pin:not(.pending)');
  if (pins[i]) pins[i].style.boxShadow = '0 0 0 3px #4ade80, 0 0 12px #4ade80';
}

function cancelMove() {
  moveIdx = null;
  document.getElementById('clear-btn').textContent = '✕ CLEAR PIN';
  document.getElementById('clear-btn').disabled = true;
  const status = document.getElementById('pending-status');
  status.textContent = 'Click anywhere on the map to drop a pin. Click again to move it. Fill in details below then hit SAVE.';
  status.className = '';
  render();
}

// ── Render saved pins + list ───────────────────────────────────────────────
function render() {
  // Remove saved pins + labels (keep pending)
  pinLayer.querySelectorAll('.pin:not(.pending), .pin-label, svg[id^="svg-label"]').forEach(p => p.remove());

  markers.forEach((m, i) => {
    const d = document.createElement('div');
    d.className = 'pin';
    d.style.left       = m.x + '%';
    d.style.top        = m.y + '%';
    d.style.background = COLORS[m.cat] || '#c9a227';
    if (i === moveIdx) d.style.boxShadow = '0 0 0 3px #4ade80, 0 0 14px #4ade80aa';
    pinLayer.appendChild(d);

    if (m.showLabel && m.name) {
      drawLabel(m, i);
    }
  });

  document.getElementById('topcount').textContent = markers.length + ' marker' + (markers.length !== 1 ? 's' : '');

  const head = document.getElementById('list-head');
  const list = document.getElementById('mlist');
  head.textContent = markers.length ? markers.length + ' MARKER' + (markers.length !== 1 ? 'S' : '') + ' SAVED' : '';
  list.innerHTML = '';
  markers.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'mitem';
    el.innerHTML = `
      <div class="mname" style="color:${COLORS[m.cat]||'#c9a227'}">${m.name}${m.showLabel ? ' <span style="font-size:0.55rem;opacity:0.6;">[LABEL]</span>' : ''}</div>
      <div class="mmeta">${m.cat} &middot; ${m.x}%, ${m.y}%</div>
      <div style="margin-top:0.3rem;display:flex;gap:0.3rem;flex-wrap:wrap;">
        <button class="btn" style="font-size:0.56rem;padding:0.15rem 0.4rem;" onclick="toggleLabel(${i})">${m.showLabel ? 'HIDE LABEL' : 'SHOW LABEL'}</button>
        <button class="btn" style="font-size:0.56rem;padding:0.15rem 0.4rem;color:#38bdf8;border-color:rgba(56,189,248,0.4);" onclick="editLabel(${i})">EDIT LABEL</button>
        <button class="btn" style="font-size:0.56rem;padding:0.15rem 0.4rem;color:#4ade80;border-color:rgba(74,222,128,0.4);" onclick="startMove(${i})">MOVE</button>
        <button class="btn red" style="font-size:0.56rem;padding:0.15rem 0.4rem;" onclick="del(${i})">DELETE</button>
      </div>`;
    list.appendChild(el);
  });
}

// Read current panel values into a temp marker and draw it
function livePreview(i) {
  const show = document.getElementById('el-show')?.checked;
  if (!show) { document.getElementById('svg-label-' + i)?.remove(); return; }
  const tmp = Object.assign({}, markers[i], {
    name: document.getElementById('el-name')?.value || markers[i].name,
    showLabel:    true,
    labelStyle:   document.getElementById('el-style')?.value    || markers[i].labelStyle,
    labelRotate:  parseInt(document.getElementById('el-rot')?.value     || markers[i].labelRotate   || 0),
    labelDistance:parseInt(document.getElementById('el-dist')?.value    || markers[i].labelDistance || 30),
    labelRadius:  parseInt(document.getElementById('el-radius')?.value  || markers[i].labelRadius   || 120),
    labelSize:    parseInt(document.getElementById('el-fsize')?.value   || markers[i].labelSize     || 11),
    labelColor:    document.getElementById('el-color')?.value         || markers[i].labelColor    || '#ffffff',
    shadowColor:   document.getElementById('el-shadow-color')?.value   || markers[i].shadowColor   || '#000000',
    shadowBlur:    parseInt(document.getElementById('el-shadow-blur')?.value    || markers[i].shadowBlur    || 4),
    shadowOpacity: parseInt(document.getElementById('el-shadow-opacity')?.value || Math.round((markers[i].shadowOpacity??0.8)*100)) / 100,
    labelOutline: document.getElementById('el-outline')?.value  || markers[i].labelOutline || '#000000',
    subtitle:     document.getElementById('el-sub')?.value      ?? markers[i].subtitle     ?? '',
    subStyle:     document.getElementById('el-substyle')?.value || markers[i].subStyle     || 'flat',
    subSize:      parseInt(document.getElementById('el-subfsize')?.value || markers[i].subSize   || 8),
    subOffset:    parseInt(document.getElementById('el-suboff')?.value  || markers[i].subOffset || 14),
    subColor:     document.getElementById('el-subcolor')?.value || markers[i].subColor     || '#aaaaaa',
    subRadius:    parseInt(document.getElementById('el-subradius')?.value || markers[i].subRadius || 150),
  });
  drawLabel(tmp, i);
}

  markers[i].desc       = document.getElementById('el-desc').value.trim();

  markers[i].url        = document.getElementById('el-url').value.trim();
  markers[i].showLabel  = document.getElementById('el-show').checked;
  markers[i].labelStyle  = document.getElementById('el-style').value;
  markers[i].labelRotate = parseInt(document.getElementById('el-rot').value);
  markers[i].labelDistance = parseInt(document.getElementById('el-dist').value);
  markers[i].labelRadius   = parseInt(document.getElementById('el-radius').value);
  markers[i].labelSize     = parseInt(document.getElementById('el-fsize').value);
  markers[i].labelColor    = document.getElementById('el-color').value;
  markers[i].shadowColor   = document.getElementById('el-shadow-color').value;
  markers[i].shadowBlur    = parseInt(document.getElementById('el-shadow-blur').value);
  markers[i].shadowOpacity = parseInt(document.getElementById('el-shadow-opacity').value) / 100;
  markers[i].labelOutline  = document.getElementById('el-outline').value;
  markers[i].subtitle      = document.getElementById('el-sub').value;
  markers[i].subStyle      = document.getElementById('el-substyle').value;
  markers[i].subSize       = parseInt(document.getElementById('el-subfsize').value);
  markers[i].subOffset     = parseInt(document.getElementById('el-suboff').value);
  markers[i].subColor      = document.getElementById('el-subcolor').value;
  markers[i].subRadius     = parseInt(document.getElementById('el-subradius').value);
  persist();
  render();
  document.getElementById('label-edit-panel')?.remove();
  document.getElementById('label-edit-backdrop')?.remove();
}

function cancelLabelEdit(i) {
  document.getElementById('label-edit-panel')?.remove();
  document.getElementById('label-edit-backdrop')?.remove();
  render(); // restore original
}

/**
 * Merge or replace markers from a parsed JSON array.
 * @param {Array} incoming - parsed marker array from file or paste
 * @param {boolean} replace - if true, wipe existing markers first
 */
function importMarkers(incoming, replace) {
  if (!Array.isArray(incoming) || incoming.length === 0) {
    document.getElementById('import-error').textContent = 'ERROR: expected a non-empty JSON array.';
    return;
  }
  const invalid = incoming.filter(m => typeof m.x !== 'number' || typeof m.y !== 'number');
  if (invalid.length) {
    document.getElementById('import-error').textContent =
      'ERROR: ' + invalid.length + ' entries missing x/y coordinates.';
    return;
  }
  document.getElementById('import-error').textContent = '';

  if (replace) {
    markers = incoming;
  } else {
    // Merge: skip duplicates by name+x+y
    const existing = new Set(markers.map(m => m.name + '|' + m.x + '|' + m.y));
    const fresh = incoming.filter(m => !existing.has(m.name + '|' + m.x + '|' + m.y));
    markers = markers.concat(fresh);
  }
  persist();
  render();
  document.getElementById('import-paste').value = '';
  document.getElementById('import-error').textContent =
    '✓ Loaded ' + incoming.length + ' markers (' + markers.length + ' total).';
  document.getElementById('import-error').style.color = '#4a7a4a';
}

/**
 * Load markers from a .json file selected via the file input.
 * @param {HTMLInputElement} input
 */
function importFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const arr = Array.isArray(data) ? data : (data.markers || data.MARKERS || null);
      if (!arr) throw new Error('No marker array found — expected root array or {markers:[...]}');
      const replace = markers.length === 0 || confirm(
        'Replace all ' + markers.length + ' existing markers with the ' + arr.length + ' from file?\n\nCancel = merge (keep both).');
      importMarkers(arr, replace);
    } catch (err) {
      document.getElementById('import-error').textContent = 'ERROR: ' + err.message;
      document.getElementById('import-error').style.color = '#cc4444';
    }
    input.value = '';
  };
  reader.readAsText(file);
}

/**
 * Load markers from the paste textarea.
 */
function importFromPaste() {
  const raw = document.getElementById('import-paste').value.trim();
  if (!raw) { document.getElementById('import-error').textContent = 'Paste JSON first.'; return; }
  try {
    const data = JSON.parse(raw);
    const arr = Array.isArray(data) ? data : (data.markers || data.MARKERS || null);
    if (!arr) throw new Error('No marker array found — expected root array or {markers:[...]}');
    const replace = markers.length === 0 || confirm(
      'Replace all ' + markers.length + ' existing markers with the ' + arr.length + ' pasted?\n\nCancel = merge (keep both).');
    importMarkers(arr, replace);
  } catch (err) {
    document.getElementById('import-error').textContent = 'ERROR: ' + err.message;
    document.getElementById('import-error').style.color = '#cc4444';
  }
}

function doExport() {
  const json = JSON.stringify(markers, null, 2);
  document.getElementById('json-out').textContent = json;
  navigator.clipboard?.writeText(json).then(() => {
    const b = event.target;
    const orig = b.textContent;
    b.textContent = '✓ COPIED!';
    setTimeout(() => b.textContent = orig, 2000);
  }).catch(() => {
    // fallback: select the pre element text
    const pre = document.getElementById('json-out');
    const range = document.createRange();
    range.selectNodeContents(pre);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}

function clearAll() {
  if (!markers.length || !confirm('Delete all ' + markers.length + ' markers?')) return;
  markers = [];
  persist();
  clearPending();
  render();
}

// ── Zoom ─────────────────────────────────────────────────────────────────
const ZOOM_STEPS = [25, 33, 50, 75, 100, 125, 150, 200, 300, 400];
let zoomIdx = 4; // start at 100%
let zoomScale = 1.0; // current scale factor (1.0 = 100%)
const mapImg = document.getElementById('map-img');
const naturalW = 4096;

function applyZoom() {
  const pct = ZOOM_STEPS[zoomIdx];
  zoomScale = pct / 100;
  mapImg.style.width = (naturalW * pct / 100) + 'px';
  document.getElementById('zoom-display').textContent = pct + '%';
  // Re-render labels so px positions match new zoom
  render();
}

function zoom(dir) {
  const scroll = document.getElementById('map-scroll');

  if (dir === 0) {
    // FIT
    const avail = scroll.clientWidth;
    let best = 0;
    for (let i = 0; i < ZOOM_STEPS.length; i++) {
      if ((naturalW * ZOOM_STEPS[i] / 100) <= avail) best = i;
    }
    zoomIdx = best;
    applyZoom();
    return;
  }

  // Zoom toward centre of current viewport
  const cx = scroll.scrollLeft + scroll.clientWidth  / 2;
  const cy = scroll.scrollTop  + scroll.clientHeight / 2;
  const fracX = cx / mapImg.offsetWidth;
  const fracY = cy / mapImg.offsetHeight;

  zoomIdx = Math.max(0, Math.min(ZOOM_STEPS.length - 1, zoomIdx + dir));
  applyZoom();

  scroll.scrollLeft = fracX * mapImg.offsetWidth  - scroll.clientWidth  / 2;
  scroll.scrollTop  = fracY * mapImg.offsetHeight - scroll.clientHeight / 2;
}

document.getElementById('map-scroll').addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();

  const scroll = document.getElementById('map-scroll');
  const rect   = scroll.getBoundingClientRect();

  // Mouse position relative to scroll container
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  // Fraction of the scroll content the mouse is over (0..1)
  const fracX = (scroll.scrollLeft + mouseX) / mapImg.offsetWidth;
  const fracY = (scroll.scrollTop  + mouseY) / mapImg.offsetHeight;

  // Apply zoom
  const dir = e.deltaY < 0 ? 1 : -1;
  zoomIdx = Math.max(0, Math.min(ZOOM_STEPS.length - 1, zoomIdx + dir));
  zoomScale = ZOOM_STEPS[zoomIdx] / 100;
  mapImg.style.width = (naturalW * zoomScale) + 'px';
  document.getElementById('zoom-display').textContent = ZOOM_STEPS[zoomIdx] + '%';

  // After zoom, scroll so the mouse stays over the same map point
  // New content size
  const newW = mapImg.offsetWidth;
  const newH = mapImg.offsetHeight;
  scroll.scrollLeft = fracX * newW - mouseX;
  scroll.scrollTop  = fracY * newH - mouseY;

  render();
}, { passive: false });

window.addEventListener('load', () => zoom(0));

render();
</script>
