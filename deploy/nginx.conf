# /etc/nginx/sites-available/thetrutharchive.org
# Symlink to /etc/nginx/sites-enabled/ after setup.
#
# Requires: certbot --nginx -d thetrutharchive.org -d www.thetrutharchive.org
# Certbot will auto-edit the ssl_certificate / ssl_certificate_key lines.

server {
    listen 80;
    listen [::]:80;
    server_name thetrutharchive.org www.thetrutharchive.org;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thetrutharchive.org www.thetrutharchive.org;

    # --- SSL (filled in by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/thetrutharchive.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thetrutharchive.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Logging ---
    access_log /var/log/nginx/thetrutharchive.access.log;
    error_log  /var/log/nginx/thetrutharchive.error.log;

    # --- Security headers (belt-and-suspenders alongside helmet) ---
    add_header X-Frame-Options        "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # --- Gzip compression ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json image/svg+xml;

    # --- Proxy to Node.js ---
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  30s;
        proxy_connect_timeout 10s;

        # Buffer settings for Stripe webhook raw body
        proxy_buffering    off;
        client_max_body_size 1m;
    }

    # --- Cache static assets at the CDN/browser level ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|pdf)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }
}
